title: FMUP
author: Tiago Jacinto
version: 1.0.4
quarto-required: ">=1.4.0"
contributes:
  formats:
    common:
      lang: pt-PT
      number-sections: false
    html:
      toc: true
      theme:
        - default
        - fmup.scss
      mainfont: "Atkinson Hyperlegible Next, Atkinson Hyperlegible, system-ui, sans-serif"
      monofont: "Geist Mono, ui-monospace, Menlo, monospace"
      code-copy: true
      code-overflow: wrap
      smooth-scroll: true
      anchor-sections: true
      link-external-newwindow: true
      link-external-icon: false
      fig-cap-location: bottom
      tbl-cap-location: top
      include-in-header:
        - text: |
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Geist+Mono:wght@400;500&display=swap">
    revealjs:
      theme:
        - default
        - fmup-revealjs.scss
      mainfont: "Atkinson Hyperlegible Next, Atkinson Hyperlegible, system-ui, sans-serif"
      monofont: "Geist Mono, ui-monospace, Menlo, monospace"
      slide-number: c/t
      slide-level: 2
      transition: none
      background-transition: none
      progress: true
      controls: false
      menu: false
      hash: true
      hash-one-based-index: true
      history: true
      preview-links: auto
      view-distance: 5
      mobile-view-distance: 3
      width: 1280
      height: 720
      margin: 0.07
      min-scale: 0.2
      max-scale: 2.0
      include-in-header:
        - text: |
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Geist+Mono:wght@400;500&display=swap">
    typst:
      papersize: a4
      mainfont: "Atkinson Hyperlegible Next"
      sansfont: "Atkinson Hyperlegible Next"
      monofont: "Geist Mono"
      fontsize: 11pt
      margin:
        x: 2.5cm
        y: 2.5cm
      number-sections: true
      toc: true
      toc-depth: 3
      include-in-header:
        text: |
          #set par(justify: true, leading: 0.7em)
          #show heading.where(level: 1): set block(below: 0.8em, above: 1.4em)
          #show heading.where(level: 1): set text(size: 1.6em)
          #show link: set text(rgb("#1a1a1a"))
          #show link: it => underline(stroke: 1pt + rgb("#FFCD00"), offset: 2pt, it)
